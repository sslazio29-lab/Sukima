name: Validate questions

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate manifest
        run: node scripts/generate-manifest.mjs

      - name: Ensure manifest is committed
        run: git diff --exit-code -- data/manifest.json
